<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preload" href="/tetris/fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin />
    <title>TETRIS</title>
    <script type="module" crossorigin src="/tetris/assets/index-C3BMcphE.js"></script>
    <link rel="stylesheet" crossorigin href="/tetris/assets/index-DSPqwK_4.css">
  </head>
  <body>
    <div class="menu-overlay" id="menu-overlay">
      <canvas id="menu-canvas" width="512" height="480"></canvas>
    </div>
    <div class="game-frame" id="game-frame">
      <div class="game" id="game">
        <div class="col-stats">
          <div class="frame frame--simple frame--atype">
            <div class="frame__inner atype-inner" id="atype">A-TYPE</div>
          </div>
          <div class="frame frame--simple frame--stats">
            <div class="frame__inner">
              <div class="stats-title">STATISTICS</div>
              <div class="stats-row"><canvas data-piece="T" width="82" height="42"></canvas><span id="stat-T">000</span></div>
              <div class="stats-row"><canvas data-piece="J" width="82" height="42"></canvas><span id="stat-J">000</span></div>
              <div class="stats-row"><canvas data-piece="Z" width="82" height="42"></canvas><span id="stat-Z">000</span></div>
              <div class="stats-row"><canvas data-piece="O" width="82" height="42"></canvas><span id="stat-O">000</span></div>
              <div class="stats-row"><canvas data-piece="S" width="82" height="42"></canvas><span id="stat-S">000</span></div>
              <div class="stats-row"><canvas data-piece="L" width="82" height="42"></canvas><span id="stat-L">000</span></div>
              <div class="stats-row"><canvas data-piece="I" width="82" height="42"></canvas><span id="stat-I">000</span></div>
            </div>
          </div>
        </div>
        <div class="col-left">
          <div class="frame frame--simple frame--lines">
            <div class="frame__inner">LINES-<span id="lines">000</span></div>
          </div>
          <div class="frame frame--bevel frame--playfield">
            <div class="frame__inner">
              <canvas id="board" width="380" height="760"></canvas>
            </div>
          </div>
        </div>
        <div class="col-right">
          <div class="frame frame--simple frame--top">
            <div class="frame__inner">
              <div>TOP</div>
              <div id="top">000000</div>
              <div class="v-gap"></div>
              <div>SCORE</div>
              <div id="score">000000</div>
            </div>
          </div>
          <div class="frame frame--bevel frame--next">
            <div class="frame__inner">
              <div class="frame__label">NEXT</div>
              <canvas id="next" width="172" height="160"></canvas>
            </div>
          </div>
          <div class="frame frame--simple frame--level">
            <div class="frame__inner">
              <div>LEVEL</div>
              <div id="level">00</div>
            </div>
          </div>
        </div>
      </div>
      <div class="game-controls" id="game-controls">
        <button class="game-btn game-btn--start" id="btn-start" tabindex="0">START</button>
        <button class="game-btn game-btn--pause hidden" id="btn-pause" tabindex="0">PAUSE</button>
        <button class="game-btn game-btn--resume hidden" id="btn-resume" tabindex="0">CONTINUE</button>
        <button class="game-btn game-btn--restart hidden" id="btn-restart" tabindex="0">RESTART</button>
        <button class="game-btn game-btn--quit" id="btn-quit" tabindex="0">QUIT</button>
      </div>
      <div class="keyboard-overlay hidden" id="keyboard-overlay">
        <div class="keyboard">
          <div class="keyboard__display">
            <span class="keyboard__label">ENTER NAME:</span>
            <span class="keyboard__input" id="keyboard-input">______</span>
          </div>
          <div class="keyboard__rows">
            <div class="keyboard__row">
              <button class="keyboard__key" data-key="A">A</button>
              <button class="keyboard__key" data-key="B">B</button>
              <button class="keyboard__key" data-key="C">C</button>
              <button class="keyboard__key" data-key="D">D</button>
              <button class="keyboard__key" data-key="E">E</button>
              <button class="keyboard__key" data-key="F">F</button>
              <button class="keyboard__key" data-key="G">G</button>
              <button class="keyboard__key" data-key="H">H</button>
              <button class="keyboard__key" data-key="I">I</button>
              <button class="keyboard__key" data-key="J">J</button>
            </div>
            <div class="keyboard__row">
              <button class="keyboard__key" data-key="K">K</button>
              <button class="keyboard__key" data-key="L">L</button>
              <button class="keyboard__key" data-key="M">M</button>
              <button class="keyboard__key" data-key="N">N</button>
              <button class="keyboard__key" data-key="O">O</button>
              <button class="keyboard__key" data-key="P">P</button>
              <button class="keyboard__key" data-key="Q">Q</button>
              <button class="keyboard__key" data-key="R">R</button>
              <button class="keyboard__key" data-key="S">S</button>
              <button class="keyboard__key" data-key="T">T</button>
            </div>
            <div class="keyboard__row">
              <button class="keyboard__key" data-key="U">U</button>
              <button class="keyboard__key" data-key="V">V</button>
              <button class="keyboard__key" data-key="W">W</button>
              <button class="keyboard__key" data-key="X">X</button>
              <button class="keyboard__key" data-key="Y">Y</button>
              <button class="keyboard__key" data-key="Z">Z</button>
              <button class="keyboard__key" data-key="0">0</button>
              <button class="keyboard__key" data-key="1">1</button>
              <button class="keyboard__key" data-key="2">2</button>
              <button class="keyboard__key" data-key="3">3</button>
            </div>
            <div class="keyboard__row">
              <button class="keyboard__key" data-key="4">4</button>
              <button class="keyboard__key" data-key="5">5</button>
              <button class="keyboard__key" data-key="6">6</button>
              <button class="keyboard__key" data-key="7">7</button>
              <button class="keyboard__key" data-key="8">8</button>
              <button class="keyboard__key" data-key="9">9</button>
              <button class="keyboard__key keyboard__key--wide" data-key="DEL">DEL</button>
              <button class="keyboard__key keyboard__key--wide keyboard__key--enter" data-key="OK">OK</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
