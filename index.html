<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="/fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin />
    <title>TETRIS</title>
  </head>
  <body>
    <div class="menu-overlay" id="menu-overlay">
      <canvas id="menu-canvas" width="512" height="480"></canvas>
    </div>
    <div class="game-frame" id="game-frame">
      <div class="game" id="game">
        <div class="col-stats">
          <div class="frame frame--simple frame--atype">
            <div class="frame__inner atype-inner" id="atype">A-TYPE</div>
          </div>
          <div class="frame frame--simple frame--stats">
            <div class="frame__inner">
              <div class="stats-title">STATISTICS</div>
              <div class="stats-row"><canvas data-piece="T" width="82" height="42"></canvas><span id="stat-T">000</span></div>
              <div class="stats-row"><canvas data-piece="J" width="82" height="42"></canvas><span id="stat-J">000</span></div>
              <div class="stats-row"><canvas data-piece="Z" width="82" height="42"></canvas><span id="stat-Z">000</span></div>
              <div class="stats-row"><canvas data-piece="O" width="82" height="42"></canvas><span id="stat-O">000</span></div>
              <div class="stats-row"><canvas data-piece="S" width="82" height="42"></canvas><span id="stat-S">000</span></div>
              <div class="stats-row"><canvas data-piece="L" width="82" height="42"></canvas><span id="stat-L">000</span></div>
              <div class="stats-row"><canvas data-piece="I" width="82" height="42"></canvas><span id="stat-I">000</span></div>
            </div>
          </div>
        </div>
        <div class="col-left">
          <div class="frame frame--simple frame--lines">
            <div class="frame__inner">LINES-<span id="lines">000</span></div>
          </div>
          <div class="frame frame--bevel frame--playfield">
            <div class="frame__inner">
              <canvas id="board" width="380" height="760"></canvas>
            </div>
          </div>
        </div>
        <div class="col-right">
          <div class="frame frame--simple frame--top">
            <div class="frame__inner">
              <div>TOP</div>
              <div id="top">000000</div>
              <div class="v-gap"></div>
              <div>SCORE</div>
              <div id="score">000000</div>
            </div>
          </div>
          <div class="frame frame--bevel frame--next">
            <div class="frame__inner">
              <div class="frame__label">NEXT</div>
              <canvas id="next" width="172" height="160"></canvas>
            </div>
          </div>
          <div class="frame frame--simple frame--level">
            <div class="frame__inner">
              <div>LEVEL</div>
              <div id="level">00</div>
            </div>
          </div>
        </div>
      </div>
      <div class="game-controls" id="game-controls">
        <button class="game-btn game-btn--start" id="btn-start" tabindex="0">START</button>
        <button class="game-btn game-btn--pause hidden" id="btn-pause" tabindex="0">PAUSE</button>
        <button class="game-btn game-btn--resume hidden" id="btn-resume" tabindex="0">CONTINUE</button>
        <button class="game-btn game-btn--quit" id="btn-quit" tabindex="0">QUIT</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
